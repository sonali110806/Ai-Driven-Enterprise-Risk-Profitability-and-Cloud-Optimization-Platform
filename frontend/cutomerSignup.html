<!DOCTYPE html>
<html>
<head>
<title>Create Customer Account</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">

<div class="logo">
<div class="logo-box"></div>

<div>
<div class="logo-text">RiskOptima AI</div>
<div class="subtitle">Enterprise Intelligence Platform</div>
</div>

</div>

<a class="back" href="#">← Back</a>

</header>


<div class="container">

<div class="icon">👤</div>

<h1 class="title">Create Customer Account</h1>
<p class="desc">Start analyzing your IT projects with AI</p>


<div class="card">

<form>

<div class="form-group">
<label>Full Name *</label>
<input type="text" placeholder="John Doe">
</div>

<div class="form-group">
<label>Email Address *</label>
<input type="email" placeholder="john.doe@company.com">
</div>

<div class="form-group">
<label>Password *</label>
<input type="password" placeholder="Minimum 8 characters">
</div>

<div class="form-group">
<label>Confirm Password *</label>
<input type="password" placeholder="Re-enter your password">
</div>

<div class="row">
<label>
<input type="checkbox"> I agree to the Terms of Service and Privacy Policy
</label>
</div>

<button>Create Account & Continue →</button>

</form>

<div class="bottom">
Already have an account? <a href="login.html">Login here</a>
</div>

</div>

</div>

</body>
</html>
