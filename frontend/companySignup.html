<!DOCTYPE html>
<html>
<head>
<title>Company Signup</title>
<link rel="stylesheet" href="riskoptima-auth.css">
</head>
<body>

<div class="navbar">
  <div class="logo">RiskOptima AI</div>
  <div>Back</div>
</div>

<div class="form-container">

<div class="form-title">Create Company Account</div>
<div class="form-sub">Get access to advanced features and project history</div>

<div class="form-grid">

<div>
<label>Company Name</label>
<input type="text">
</div>

<div>
<label>Contact Person</label>
<input type="text">
</div>

<div>
<label>Company Email</label>
<input type="email">
</div>

<div>
<label>Phone Number</label>
<input type="text">
</div>

<div>
<label>Password</label>
<input type="password">
</div>

<div>
<label>Confirm Password</label>
<input type="password">
</div>

</div>

<button class="submit-btn">Create Company Account & Continue</button>

</div>

</body>
</html>
